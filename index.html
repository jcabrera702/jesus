<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jesus – Content</title>

  <style>
    :root {
      --bg1: #071426;
      --bg2: #0e2a4f;
      --accent: #7dd3fc;
      --accent-2: #60a5fa;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --muted: rgba(255, 255, 255, 0.7);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    html, body {
      height: 100%;
      margin: 0;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(1000px 600px at 50% 10%, rgba(96, 165, 250, 0.12), transparent 80%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      color: #f8fafc;
      -webkit-font-smoothing: antialiased;
      padding: 16px;
      box-sizing: border-box;
    }

    .app {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 8px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: grid;
      place-items: center;
      font-weight: 800;
      color: #02101f;
      box-shadow: 0 8px 20px rgba(125, 211, 252, 0.2);
      letter-spacing: 0.04em;
    }

    .title-block h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: 0.01em;
      font-weight: 700;
    }

    .title-block p {
      margin: 2px 0 0 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Slider Desktop Wrapper Positioner */
    .slider-wrapper {
      position: relative;
      width: 100%;
    }

    /* Desktop Navigation Arrows */
    .nav-arrow {
      display: none; /* Hidden on mobile by default */
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      font-size: 1.1rem;
    }

    .nav-arrow:hover {
      background: var(--accent);
      color: #02101f;
      box-shadow: 0 0 15px rgba(125, 211, 252, 0.4);
    }

    .nav-arrow:active {
      transform: translateY(-50%) scale(0.95);
    }

    .nav-arrow.prev { left: -60px; }
    .nav-arrow.next { right: -60px; }

    /* Expose desktop controls when screen space allows */
    @media (min-width: 620px) {
      .nav-arrow { display: flex; }
    }

    /* Native Horizontal Swipe Deck Wrapper */
    .slider-container {
      width: 100%;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      display: flex;
      gap: 16px;
      padding: 12px 4px 24px;
      box-sizing: border-box;
      scrollbar-width: none; /* Hide scrollbars Chrome/Firefox */
    }

    .slider-container::-webkit-scrollbar {
      display: none; /* Hide scrollbars Safari */
    }

    /* Premium Sliding Deck Individual Cards */
    .slide-card {
      flex: 0 0 100%;
      scroll-snap-align: center;
      box-sizing: border-box;
      border-radius: 24px;
      padding: 24px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
      border: 1px solid var(--glass-border);
      box-shadow: 
        0 24px 48px -12px rgba(2, 6, 23, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 290px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 12px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .card-badge {
      font-size: 0.75rem;
      background: var(--glass);
      padding: 4px 10px;
      border-radius: 99px;
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .grid-layout {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-grow: 1;
      justify-content: center;
    }

    /* Tactile Premium Anchor Buttons */
    .action-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 16px 20px;
      border-radius: 14px;
      color: #f1f5f9;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .action-btn::after {
      content: '→';
      font-size: 1.1rem;
      color: var(--accent);
      transition: transform 0.2s ease;
    }

    .action-btn:hover {
      background: rgba(15, 23, 42, 0.6);
      border-color: rgba(125, 211, 252, 0.2);
    }

    .action-btn:hover::after {
      transform: translateX(4px);
    }

    .action-btn:active {
      transform: scale(0.98);
      background: rgba(15, 23, 42, 0.8);
    }

    /* Swipe Indicator Dots UI */
    .pagination-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: -8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      transition: all 0.3s ease;
    }

    .dot.active {
      width: 18px;
      background: var(--accent);
      border-radius: 3px;
    }
  </style>
</head>
<body>

  <main class="app" role="main">
    <header class="header">
      <div class="logo" aria-hidden="true">JC</div>
      <div class="title-block">
        <h1>Christian Page</h1>
        <p>Swipe or use side arrows to navigate</p>
      </div>
    </header>

    <div class="slider-wrapper">
      <!-- Desktop Interactive Arrows -->
      <button class="nav-arrow prev" onclick="moveSlider(-1)" aria-label="Previous slide">←</button>
      <button class="nav-arrow next" onclick="moveSlider(1)" aria-label="Next slide">→</button>

      <!-- Native Horizontal Swipe Deck -->
      <div class="slider-container" id="deckSlider">
        
        <!-- CARD 1: Core Resources -->
        <section class="slide-card">
          <div class="card-header">
            <span class="card-title">General Resources</span>
            <span class="card-badge">1 of 2</span>
          </div>
          <div class="grid-layout">
            <a href="./context-bible.html" class="action-btn">context bible</a>
            <a href="./character.html" class="action-btn">Personas</a>
            <a href="https://jcabrera702.github.io/daily/?group=group-ho1csh" rel="noopener noreferrer" class="action-btn">Monday Men Prayer List</a>
          </div>
        </section>

        <!-- CARD 2: Service Rotations -->
        <section class="slide-card">
          <div class="card-header">
            <span class="card-title">Weekly Gatherings</span>
            <span class="card-badge">2 of 2</span>
          </div>
          <div class="grid-layout">
            <a href="./Sunday/sunday-home.html" rel="noopener noreferrer" class="action-btn">Sunday</a>
            <a href="./Wednesday/wed-home.html" rel="noopener noreferrer" class="action-btn">Wednesday</a>
          </div>
        </section>

      </div>
    </div>

    <!-- Pagination Track Elements -->
    <div class="pagination-dots">
      <div class="dot active" id="dot1"></div>
      <div class="dot" id="dot2"></div>
    </div>
  </main>

  <script>
    const slider = document.getElementById('deckSlider');
    const dot1 = document.getElementById('dot1');
    const dot2 = document.getElementById('dot2');

    // Dynamically update pagination dots based on actual scroll viewport track position
    slider.addEventListener('scroll', () => {
      const scrollIndex = Math.round(slider.scrollLeft / slider.offsetWidth);
      if (scrollIndex === 0) {
        dot1.classList.add('active');
        dot2.classList.remove('active');
      } else {
        dot2.classList.add('active');
        dot1.classList.remove('active');
      }
    });

    // Desktop Click-to-Scroll translation utility
    function moveSlider(direction) {
      const cardWidth = slider.offsetWidth;
      slider.scrollBy({
        left: direction * cardWidth,
        behavior: 'smooth'
      });
    }
  </script>

</body>
</html>
